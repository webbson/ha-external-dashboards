name: "External Dashboards"
description: "Create and display dashboards outside of Home Assistant"
version: "0.1.7"
slug: "external_dashboards"
url: "https://github.com/webbson/ha-external-dashboards"
image: "ghcr.io/webbson/{arch}-external-dashboards"
arch:
  - aarch64
  - amd64
init: false
startup: application
boot: auto
stage: experimental
homeassistant: "2024.1.0"
homeassistant_api: true
hassio_api: true
ingress: true
ingress_port: 8080
panel_icon: "mdi:view-dashboard-outline"
panel_title: "External Dashboards"
# Custom AppArmor profile lives in apparmor.txt (Supervisor loads it
# automatically when apparmor is not explicitly disabled).
# Bridge networking is fine for the common case. Admins who want MAC-based
# display-client identification (see DOCS.md) can flip this to true.
host_network: false
# Ingress panel is visible in the sidebar only for admin HA users.
panel_admin: true
ports:
  8099/tcp: 8099
ports_description:
  8099/tcp: "External dashboard display port (for browser clients on the LAN)"
map:
  - config:rw
options:
  # Leave both blank to have the add-on generate and persist a random
  # JWT secret on first boot. Set them explicitly to share secrets across
  # reinstalls or to pin the MCP API key.
  jwt_secret: ""
  mcp_api_key: ""
  # Base URL for the external display server (e.g. http://192.168.1.100:8099).
  # Leave blank to auto-detect from the primary network interface IP.
  external_base_url: ""
schema:
  jwt_secret: "str?"
  mcp_api_key: "str?"
  external_base_url: "str?"
