name: Release

on:
  push:
    tags:
      - "v*.*.*"
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release (e.g. 0.1.0). Must match external_dashboards/config.yaml."
        required: true

permissions:
  contents: write
  packages: write

jobs:
  build:
    name: Build ${{ matrix.arch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            platform: linux/amd64
          - arch: aarch64
            platform: linux/arm64
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event_name }}" = "release" ]; then
            echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          else
            echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          fi

      - name: Verify version matches config.yaml
        run: |
          CONFIG_VERSION=$(grep '^version:' external_dashboards/config.yaml | sed -E 's/version: *"?([^"]+)"?/\1/')
          if [ "${{ steps.version.outputs.version }}" != "$CONFIG_VERSION" ]; then
            echo "::error::tag version (${{ steps.version.outputs.version }}) != config.yaml version ($CONFIG_VERSION)"
            exit 1
          fi

      - name: Lowercase repository owner (GHCR requires lowercase)
        id: owner
        run: echo "owner=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU (needed for aarch64 cross-build on amd64 runner)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        # We skip home-assistant/builder because our Dockerfile sits in a
        # subfolder but needs the repo root as build context (pnpm monorepo
        # with packages/ at root). builder locks context == target.
        # docker/build-push-action handles multi-arch cross-builds fine and
        # the resulting image is what Supervisor pulls via config.yaml's
        # `image:` field.
        uses: docker/build-push-action@v6
        with:
          context: .
          file: external_dashboards/Dockerfile
          platforms: ${{ matrix.platform }}
          push: true
          tags: |
            ghcr.io/${{ steps.owner.outputs.owner }}/${{ matrix.arch }}-external-dashboards:${{ steps.version.outputs.version }}
            ghcr.io/${{ steps.owner.outputs.owner }}/${{ matrix.arch }}-external-dashboards:latest
          labels: |
            org.opencontainers.image.title=External Dashboards
            org.opencontainers.image.source=https://github.com/webbson/ha-external-dashboards
            org.opencontainers.image.version=${{ steps.version.outputs.version }}
            org.opencontainers.image.licenses=LicenseRef-OSaaSy
          cache-from: type=gha,scope=${{ matrix.arch }}
          cache-to: type=gha,scope=${{ matrix.arch }},mode=max
