name: Release

on:
  push:
    tags:
      - "v*.*.*"
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release (e.g. 0.1.0). Must match config.yaml."
        required: true

permissions:
  contents: write
  packages: write

jobs:
  build:
    name: Build ${{ matrix.arch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        arch: [aarch64, amd64, armv7]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event_name }}" = "release" ]; then
            echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          else
            echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          fi

      - name: Verify version matches config.yaml
        run: |
          CONFIG_VERSION=$(grep '^version:' config.yaml | sed -E 's/version: *"?([^"]+)"?/\1/')
          if [ "${{ steps.version.outputs.version }}" != "$CONFIG_VERSION" ]; then
            echo "::error::tag version (${{ steps.version.outputs.version }}) != config.yaml version ($CONFIG_VERSION)"
            exit 1
          fi

      - name: Lowercase repository owner (GHCR requires lowercase)
        id: owner
        run: echo "owner=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Run Home Assistant builder
        uses: home-assistant/builder@2024.08.2
        with:
          # `image:` is the builder-container arch tag (the builder image
          # itself). Must match --<arch> in args.
          image: ${{ matrix.arch }}
          # --target must be an absolute path inside the builder container.
          # The action mounts ${GITHUB_WORKSPACE} at /data, so /data is the
          # repo root (our add-on lives there).
          args: |
            --${{ matrix.arch }} \
            --target /data \
            --image "ghcr.io/${{ steps.owner.outputs.owner }}/{arch}-external-dashboards" \
            --version "${{ steps.version.outputs.version }}" \
            --addon
