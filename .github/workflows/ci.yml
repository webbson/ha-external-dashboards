name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  lint-and-build:
    name: Lint, build, test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build all packages
        run: pnpm -r build

      - name: Run server tests
        run: pnpm --filter @ha-external-dashboards/server test

  lint-addon:
    name: Lint add-on manifest
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Lint YAML (config.yaml, build.yaml, workflows)
        uses: frenck/action-yamllint@v1.5
        with:
          # Config lives at repo root (.yamllint.yml) — keeps the ignore
          # list (pnpm-lock.yaml, node_modules, etc.) in version control
          # rather than inline.
          config: .yamllint.yml

      - name: Lint Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile
          # DL3018 (apk add without version pin) is acceptable for HA base images.
          # DL3059 (multiple consecutive RUN) is fine — the two RUNs have distinct concerns.
          ignore: DL3018,DL3059

  docker-build:
    name: Docker build (amd64)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build amd64 image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          build-args: |
            BUILD_FROM=ghcr.io/home-assistant/amd64-base:3.20
          platforms: linux/amd64
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
